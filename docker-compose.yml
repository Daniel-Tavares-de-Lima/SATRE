services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: satre
      POSTGRES_PASSWORD: satre
      POSTGRES_DB: satre
    ports:
      - "5432:5432"
    volumes:
      - satre_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U satre -d satre"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  satre_pg_data:
